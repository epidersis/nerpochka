services:
  postgres:
    image: postgres:16-trixie
    container_name: budget_postgres
    restart: always
    environment:
      POSTGRES_DB: budget_analytics
      POSTGRES_USER: budget_user
      POSTGRES_PASSWORD: budget_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U budget_user -d budget_analytics"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

  backend:
    build: ./backend
    container_name: budget_backend
    restart: always
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./data:/data
    depends_on:
      postgres:
        condition: service_healthy

  etl:
    build: ./etl
    container_name: budget_etl
    env_file:
      - .env
    volumes:
      - ./etl:/etl
      - ./data:/data
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "
        echo 'ETL: starting raw import' &&
        python run_import.py &&
        echo 'ETL: building staging and mart' &&
        python run_pipeline.py &&
        echo 'ETL: done, keeping container alive' &&
        tail -f /dev/null
      "

  frontend:
    build: ./frontend
    container_name: budget_frontend
    restart: always
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:
